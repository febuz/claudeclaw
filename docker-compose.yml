version: '3.9'

services:
  claudeclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claudeclaw
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - ./results:/app/results
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  researcher-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: researcher-mcp
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    ports:
      - "3001:3001"
    command: ["dist/mcp-servers/researcher-mcp.js"]
    restart: unless-stopped

  skills-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skills-mcp
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    ports:
      - "3002:3002"
    command: ["dist/mcp-servers/skills-mcp.js"]
    restart: unless-stopped

volumes:
  results:
  config:
